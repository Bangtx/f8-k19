<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
</head>
<body>

<h1>Try a free sample</h1>
<p>
  Sign up to get a coupon you can redeem at your nearest Dancing Goat cafe for a sample of the Colombia Carlos Imbachi
  coffee. We'll also make sure you don't miss out on news introducing the new coffees that we add to our store regularly.
</p>

<!-- Grid layout -->
<table>
  <tr>
    <td>
      <label for="firstName">Frist name</label>
      <br>
      <input id="firstName" name="firstName" placeholder="John" type="text">
    </td>
    <td>
      <label for="lastName">Last name</label>
      <br>
      <input id="lastName" name="firstName" placeholder="Smith" type="text">
    </td>
  </tr>

  <tr>
    <td>
      <label for="email">Email address</label>
      <br>
      <input id="email" name="email" placeholder="John@example.com" type="email">
    </td>
    <td>
      <label for="address">Address</label>
      <br>
      <input id="address" name="address" placeholder="HN" type="text">
    </td>
  </tr>

  <tr>
    <td>
      <label for="city">City</label>
      <br>
      <input id="city" name="city" placeholder="London">
    </td>
    <td>
      <label for="stage">Stage (Optional)</label>
      <br>
      <input id="stage" name="stage" placeholder="" type="text">
    </td>
  </tr>

  <tr>
    <td>
      <label for="zipcode">Zip code</label>
      <br>
      <input id="zipcode" name="zipcode" placeholder="100000">
    </td>
    <td>
      <label for="country">Country</label>
      <br>
      <select id="country" name="country" style="width: 185px">
        <option>Viet Nam</option>
        <option >China</option>
        <option>Korea</option>
      </select>
    </td>
  </tr>

  <tr>
    <td colspan="2">
      <button style="width: 380px">Submit</button>
    </td>
  </tr>

</table>

</body>
</html>
