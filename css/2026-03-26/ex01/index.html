<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    .box-1, .box-2, .box-3 {
        width: 100px;
        height: 100px;
        background-color: red;
        /*margin: 10px;*/
        color: white;
        font-size: 30px;
        font-weight: bold;

        display: flex;
        align-items: center;
        justify-content: center;
    }
    .box-2 {
        background-color: green;
    }
    .box-3 {
        background-color: blue;
    }
    .container {
        display: flex;
        border: 3px solid red;
        flex-direction: row-reverse; /* thay doi truc */
        height: 500px;
        justify-content: space-evenly; /* tac truc chinh */
        align-items: center; /* tac truc phu */
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="box-1">1</div>
    <div class="box-2">2</div>
    <div class="box-3">3</div>
  </div>
</body>
</html>
