<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="overlay">
    <div class="model">
      <h2>Dang ki tu van</h2>
      <p>Dien thong tin de dc tu van lo trinh hoc phu hop</p>

      <div class="close-btn">&times;</div>

      <div>
        <label for="name">Ho & Ten</label>
        <input type="text" id="name" placeholder="Nguyen Van A">
      </div>

      <div>
        <label for="phone">So Dien Thoai</label>
        <input type="tel" id="phone" placeholder="023049103213">
      </div>

      <div>
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="example@test.com">
      </div>

      <div class="courses">
        <div>
          <input type="checkbox" id="htmlcss" name="courses[]" value="htmlcss">
          <label for="htmlcss">Html & Css</label>
        </div>

        <div>
          <input type="checkbox" id="js" name="courses[]" value="javascript">
          <label for="js">javascript</label>
        </div>

        <div>
          <input type="checkbox" id="fe" name="courses[]" value="frontend">
          <label for="fe">HFrontend</label>
        </div>
      </div>

      <button>Dang Ky Tu Van Ngay</button>
    </div>
  </div>
</body>
</html>
