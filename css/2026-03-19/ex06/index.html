      p {
          display: none;
      }

      #btn:checked ~ p {
          display: block;
      }

      #btn:checked ~ button .show-btn {
          display: none;
      }

      #btn:checked ~ button .hide-btn {
          display: block;
      }

      .hide-btn {
          display: none;
      }
  </style>

</head>
<body>

<input type="checkbox" id="btn" hidden>
<button>
  <label for="btn" class="show-btn">show msg</label>
  <label for="btn" class="hide-btn">an msg</label>
</button>

<p>MSG DA DC HIEN</p>
